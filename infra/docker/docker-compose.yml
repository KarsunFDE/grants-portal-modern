# grants-portal-modern — local dev orchestration
#
# ⚠ DELIBERATE BROWNFIELD DEBT (cross-references docs/brownfield-debt.md):
#   - postgres data volume NOT mounted (data lost on restart) — Item 11 reinforcement
#   - no healthchecks on any service — Item 11 reinforcement
#   - service images use :latest (Item 11)
#
# Bring up the full stack:
#   docker-compose -f infra/docker/docker-compose.yml up --build
#
# Endpoints once up:
#   http://localhost:8080         — api-gateway
#   http://localhost:8081         — grant-application-service (direct)
#   http://localhost:8082         — peer-review-service (direct)
#   http://localhost:8000         — ai-orchestrator
#   http://localhost:4200         — Angular SPA
#   localhost:5432                — postgres
#   localhost:27017               — mongodb

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: grants_portal_modern
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_dev_password
    ports:
      - "5432:5432"
    # ⚠ DELIBERATE: no volume mount. Restart = data loss.
    # Cohort fixes in W1 Tue inventory follow-up.

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: app
      MONGO_INITDB_ROOT_PASSWORD: app_dev_password
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db   # ← inconsistency vs postgres — teaching moment

  # ADR 0007 Phase B — Atlas Local for vector search development.
  # Same collection schema and index definitions as managed Atlas (ADR 0006 §2).
  # Exposed on host port 27018 to avoid conflict with plain mongo above.
  # Set ATLAS_RETRIEVAL_ENABLED=true in ai-orchestrator to activate.
  mongodb-atlas-local:
    image: mongodb/mongodb-atlas-local
    ports:
      - "27018:27017"
    volumes:
      - atlas-data:/data/db

  api-gateway:
    build:
      context: ../../services/api-gateway
    image: grants-portal-modern/api-gateway:latest   # ⚠ Item 11
    ports:
      - "8080:8080"
    environment:
      JWT_ISSUER_URI: http://localhost:8090/auth
      GRANT_APPLICATION_SERVICE_URL: http://grant-application-service:8081
      PEER_REVIEW_SERVICE_URL: http://peer-review-service:8082
      AI_ORCHESTRATOR_URL: http://ai-orchestrator:8000
    depends_on:
      - grant-application-service
      - peer-review-service
      - ai-orchestrator
    # ⚠ no healthcheck

  grant-application-service:
    build:
      context: ../../services/grant-application-service
    image: grants-portal-modern/grant-application-service:latest   # ⚠ Item 11
    ports:
      - "8081:8081"
    environment:
      MONGO_URL: mongodb://app:app_dev_password@mongodb:27017
      MONGO_DB: grants_portal_modern
      AI_ORCHESTRATOR_URL: http://ai-orchestrator:8000
      JWT_ISSUER_URI: http://localhost:8090/auth
    depends_on:
      - mongodb
      - ai-orchestrator
    # ⚠ no healthcheck

  peer-review-service:
    build:
      context: ../../services/peer-review-service
    image: grants-portal-modern/peer-review-service:latest   # ⚠ Item 11
    ports:
      - "8082:8082"
    environment:
      GRANT_APPLICATION_SERVICE_URL: http://grant-application-service:8081
      # ⚠ DELIBERATE: peer-review-service calls grant-application-service directly,
      #   not through the gateway — tighter coupling than necessary, and the
      #   call has no circuit breaker (Item 3).
    depends_on:
      - grant-application-service
    # ⚠ no healthcheck

  ai-orchestrator:
    build:
      context: ../../services/ai-orchestrator
    image: grants-portal-modern/ai-orchestrator:latest   # ⚠ Item 11
    ports:
      - "8000:8000"
    env_file:
      - path: ../../.env
        required: false
    environment:
      AWS_REGION: us-east-1
      BEDROCK_MODEL_ID: anthropic.claude-3-7-sonnet-20250219-v1:0
      MONGO_URL: mongodb://app:app_dev_password@mongodb:27017
      ATLAS_URI: mongodb://mongodb-atlas-local:27017
      ATLAS_DB_NAME: grantsportal_retrieval
      ATLAS_RETRIEVAL_ENABLED: "false"   # Phase B: flip to "true" after ingest_corpus.py runs
    depends_on:
      - mongodb
      - mongodb-atlas-local
    # ⚠ DELIBERATE: no AWS creds wired — relies on shared dev IAM role being
    #   mounted via ~/.aws/credentials. The Bedrock stub returns mock data
    #   so it works without real creds. First-day learners discover this and
    #   learn to run `aws configure sso`.
    # ⚠ no healthcheck

  frontend:
    build:
      context: ../../frontend
    image: grants-portal-modern/frontend:latest   # ⚠ Item 11
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    # ⚠ no healthcheck

volumes:
  mongo-data:
  atlas-data:
