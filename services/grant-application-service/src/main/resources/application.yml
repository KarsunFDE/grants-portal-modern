server:
  port: 8081

spring:
  application:
    name: grant-application-service
  data:
    mongodb:
      uri: ${MONGO_URL:mongodb://app:app_dev_password@localhost:27017}
      database: ${MONGO_DB:grants_portal_modern}
      auto-index-creation: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8090/auth}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  # ⚠ DELIBERATE — Item 6: grant-application-service uses correlationId (not X-Request-ID).
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [correlationId=%X{correlationId:-}] %logger{36} - %msg%n"
  level:
    com.karsunfde.grantsportal: INFO
